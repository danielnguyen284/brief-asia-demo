version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: briefasia-postgres
    restart: always
    environment:
      POSTGRES_DB: briefasia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "54325:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
